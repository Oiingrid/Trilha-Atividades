<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trilha do Dia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0C10;
    --surface:#15171E;
    --surface-2:#1D2028;
    --border:#262A34;
    --text:#EDEEF2;
    --text-dim:#8A8F9C;
    --text-faint:#565B68;

    --dawn:#FFB07C;
    --morning:#FFD166;
    --midday:#4ECDC4;
    --evening:#7C7FE0;
    --night:#2B2D42;

    --c-work:#5EA8FF;
    --c-college:#FF9F5A;
    --c-gym:#FF6B6B;
    --c-run:#FFB84D;
    --c-read:#B98CFF;
    --c-english:#4CD9C0;
    --c-series:#F977B0;
    --c-meal:#9BD46B;
    --c-rest:#7B8299;
    --c-other:#E0C341;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; height:100%; overflow-x:hidden;}
  .app{max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative;}

  /* Header */
  header{padding:20px 18px 14px; position:sticky; top:0; z-index:20; background:linear-gradient(180deg, var(--bg) 70%, transparent); }
  .eyebrow{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-faint); font-weight:600; margin-bottom:2px;}
  .title-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  h1{font-family:'Space Grotesk', sans-serif; font-size:22px; font-weight:700; margin:0; letter-spacing:-.01em;}
  .date-nav{display:flex; align-items:center; gap:6px;}
  .nav-btn{width:34px; height:34px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer;}
  .nav-btn:active{background:var(--surface-2);}
  .date-label{font-size:13px; color:var(--text-dim); text-transform:capitalize; cursor:pointer; padding:6px 2px;}
  .date-input-hidden{position:absolute; opacity:0; width:1px; height:1px; pointer-events:none;}
  .toolbar{display:flex; gap:8px; margin-top:12px;}
  .pill-btn{font-family:'Inter'; font-size:12.5px; font-weight:600; color:var(--text-dim); background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:7px 13px; cursor:pointer;}
  .pill-btn:active{background:var(--surface-2); color:var(--text);}

  /* Rail */
  .rail-wrap{flex:1; padding:6px 18px 120px; position:relative;}
  .rail{position:relative; margin-left:52px; border-left:2px solid var(--border); }
  .hour-row{position:relative; box-sizing:content-box;}
  .hour-label{position:absolute; left:-52px; top:-7px; width:44px; text-align:right; font-family:'Space Grotesk'; font-size:11px; color:var(--text-faint); font-weight:600;}
  .hour-tick{position:absolute; left:-2px; top:0; width:8px; height:2px; background:var(--border);}

  .rail-glow{position:absolute; left:-2px; top:0; width:2px; opacity:.55; pointer-events:none;}

  .blocks-layer{position:absolute; top:0; left:12px; right:0;}
  .block{position:absolute; border-radius:12px; padding:8px 10px; border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(2px); cursor:pointer; overflow:hidden; transition:transform .12s ease;}
  .block:active{transform:scale(0.98);}
  .block .b-time{font-family:'Space Grotesk'; font-size:10.5px; font-weight:600; opacity:.85; margin-bottom:1px; display:block;}
  .block .b-title{font-size:12.5px; font-weight:600; line-height:1.15; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .block .b-note{font-size:11px; opacity:.75; margin-top:2px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

  .empty-hint{margin:40px 0 0 0; text-align:center; color:var(--text-faint); font-size:13px; line-height:1.6; padding:0 30px;}
  .empty-hint b{color:var(--text-dim);}

  /* FAB */
  .fab{position:fixed; right:0; bottom:0; max-width:480px; width:100%; margin:0 auto; left:0; display:flex; justify-content:flex-end; padding:0 22px 90px; pointer-events:none; z-index:9999;}
  .fab button{pointer-events:auto; width:56px; height:56px; border-radius:18px; border:none; background:var(--morning); color:#1A1200; font-size:26px; font-weight:600; box-shadow:0 8px 24px rgba(255,209,102,0.35); cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .fab button:active{transform:scale(0.95);}

  /* Modal */
  .overlay{position:fixed; inset:0; background:rgba(5,6,9,0.6); z-index:50; opacity:0; pointer-events:none; transition:opacity .2s ease;}
  .overlay.show{opacity:1; pointer-events:auto;}
  .sheet{position:fixed; left:0; right:0; bottom:0; max-width:480px; margin:0 auto; background:var(--surface); border-radius:22px 22px 0 0; z-index:51; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); transform:translateY(100%); transition:transform .25s cubic-bezier(.32,.72,0,1); max-height:88vh; overflow-y:auto; border-top:1px solid var(--border);}
  .sheet.show{transform:translateY(0);}
  .sheet-handle{width:36px; height:4px; background:var(--border); border-radius:99px; margin:0 auto 16px;}
  .sheet h2{font-family:'Space Grotesk'; font-size:17px; margin:0 0 16px;}
  .field-label{font-size:11.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-faint); font-weight:600; margin:14px 0 8px;}
  .cat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .cat-chip{display:flex; flex-direction:column; align-items:center; gap:4px; padding:10px 4px; border-radius:14px; border:1.5px solid var(--border); background:var(--surface-2); cursor:pointer; font-size:11px; color:var(--text-dim); font-weight:600;}
  .cat-chip .dot{width:20px; height:20px; border-radius:7px;}
  .cat-chip.selected{border-color:var(--sel-color, var(--morning)); background:color-mix(in srgb, var(--sel-color, var(--morning)) 14%, var(--surface-2));}
  .cat-chip.selected{color:var(--text);}
  input[type=text], input[type=time], textarea{width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:11px; padding:11px 12px; color:var(--text); font-family:'Inter'; font-size:14px; margin-top:0;}
  textarea{resize:none; min-height:56px; font-family:'Inter';}
  input:focus, textarea:focus{outline:2px solid var(--midday); outline-offset:1px;}
  .time-row{display:flex; gap:10px;}
  .time-row > div{flex:1;}
  .sheet-actions{display:flex; gap:10px; margin-top:22px;}
  .btn{flex:1; border:none; border-radius:12px; padding:13px; font-family:'Inter'; font-weight:700; font-size:14px; cursor:pointer;}
  .btn-save{background:var(--morning); color:#1A1200;}
  .btn-save:active{opacity:.85;}
  .btn-delete{background:transparent; color:#FF8A8A; border:1px solid rgba(255,138,138,.35);}
  .btn-cancel{background:var(--surface-2); color:var(--text-dim); border:1px solid var(--border);}

  ::-webkit-scrollbar{width:0; height:0;}
  .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:100px; background:var(--surface-2); border:1px solid var(--border); color:var(--text); font-size:13px; padding:10px 16px; border-radius:11px; z-index:60; opacity:0; transition:opacity .25s ease; pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow" id="weekdayLabel">Quinta-feira</div>
    <div class="title-row">
      <h1>Trilha do dia</h1>
      <div class="date-nav">
        <button class="nav-btn" id="prevDay" aria-label="Dia anterior">‹</button>
        <span class="date-label" id="dateLabel">9 de julho</span>
        <button class="nav-btn" id="nextDay" aria-label="Próximo dia">›</button>
        <input type="date" id="dateInput" class="date-input-hidden">
      </div>
    </div>
    <div class="toolbar">
      <button class="pill-btn" id="todayBtn">Hoje</button>
      <button class="pill-btn" id="copyBtn">Copiar de ontem</button>
    </div>
  </header>

  <div class="rail-wrap">
    <div class="rail" id="rail"></div>
    <div class="empty-hint" id="emptyHint" style="display:none;">
      Ainda não há nada planejado para este dia.<br>
      Toque no <b>+</b> para encaixar academia, corrida, inglês, leitura, estudos e sua série. 🌙
    </div>
  </div>

  <div class="fab"><button id="addBtn" aria-label="Adicionar atividade">+</button></div>
</div>

<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <h2 id="sheetTitle">Nova atividade</h2>

  <div class="field-label">Categoria</div>
  <div class="cat-grid" id="catGrid"></div>

  <div class="field-label">Nome</div>
  <input type="text" id="titleInput" maxlength="40" placeholder="Ex: Corrida no parque">

  <div class="field-label">Horário</div>
  <div class="time-row">
    <div>
      <input type="time" id="startInput">
    </div>
    <div>
      <input type="time" id="endInput">
    </div>
  </div>

  <div class="field-label">Nota (opcional)</div>
  <textarea id="noteInput" maxlength="120" placeholder="Detalhe rápido..."></textarea>

  <div class="sheet-actions">
    <button class="btn btn-cancel" id="cancelBtn">Cancelar</button>
    <button class="btn btn-delete" id="deleteBtn" style="display:none;">Excluir</button>
    <button class="btn btn-save" id="saveBtn">Salvar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATEGORIES = [
  {id:'work',    label:'Estudo/Trabalho', emoji:'💼', color:'var(--c-work)'},
  {id:'college', label:'Faculdade',       emoji:'🎓', color:'var(--c-college)'},
  {id:'gym',     label:'Academia',        emoji:'🏋️', color:'var(--c-gym)'},
  {id:'run',     label:'Corrida',         emoji:'🏃', color:'var(--c-run)'},
  {id:'read',    label:'Leitura',         emoji:'📖', color:'var(--c-read)'},
  {id:'english', label:'Inglês',          emoji:'🇬🇧', color:'var(--c-english)'},
  {id:'series',  label:'Série/Filme',     emoji:'🎬', color:'var(--c-series)'},
  {id:'meal',    label:'Refeição',        emoji:'🍽️', color:'var(--c-meal)'},
  {id:'rest',    label:'Descanso',        emoji:'😴', color:'var(--c-rest)'},
  {id:'other',   label:'Outro',           emoji:'✨', color:'var(--c-other)'},
];

const START_HOUR = 5;
const END_HOUR = 25; // até 01:00 do dia seguinte, exibido como 25 na trilha
const HOUR_H = 64;

let currentDate = new Date();
let blocks = [];
let editingId = null;
let selectedCat = CATEGORIES[0].id;

const $ = (id) => document.getElementById(id);
const pad = (n) => String(n).padStart(2,'0');

function dateKey(d){
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function fmtDateLabel(d){
  const opts = {day:'numeric', month:'long'};
  return d.toLocaleDateString('pt-BR', opts);
}
function fmtWeekday(d){
  return d.toLocaleDateString('pt-BR', {weekday:'long'});
}
function isToday(d){
  const t = new Date();
  return dateKey(d) === dateKey(t);
}
function timeToMinutes(t){
  const [h,m] = t.split(':').map(Number);
  let total = h*60+m;
  if (h < START_HOUR) total += 24*60; // horários de madrugada contam como "depois da meia-noite"
  return total;
}
function minutesToTop(mins){
  return ((mins - START_HOUR*60)/60) * HOUR_H;
}
function uid(){
  return 'b' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}
function catOf(id){ return CATEGORIES.find(c=>c.id===id) || CATEGORIES[CATEGORIES.length-1]; }

function showToast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

async function loadBlocks(d){
  try{
    const res = await window.storage.get('blocks:' + dateKey(d), false);
    blocks = res ? JSON.parse(res.value) : [];
  }catch(e){
    blocks = [];
  }
}
async function saveBlocks(d){
  try{
    await window.storage.set('blocks:' + dateKey(d), JSON.stringify(blocks), false);
  }catch(e){
    showToast('Não foi possível salvar. Tente novamente.');
  }
}

function renderHeader(){
  $('dateLabel').textContent = isToday(currentDate) ? 'Hoje, ' + fmtDateLabel(currentDate) : fmtDateLabel(currentDate);
  $('weekdayLabel').textContent = fmtWeekday(currentDate);
  $('dateInput').value = dateKey(currentDate);
}

function renderRail(){
  const rail = $('rail');
  rail.innerHTML = '';
  const totalHeight = (END_HOUR - START_HOUR) * HOUR_H;
  rail.style.height = totalHeight + 'px';

  // glow gradient along rail representing dawn -> night
  const glow = document.createElement('div');
  glow.className = 'rail-glow';
  glow.style.height = totalHeight + 'px';
  glow.style.background = 'linear-gradient(180deg, var(--dawn), var(--morning) 20%, var(--midday) 45%, var(--evening) 72%, var(--night) 100%)';
  rail.appendChild(glow);

  for(let h = START_HOUR; h < END_HOUR; h++){
    const row = document.createElement('div');
    row.className = 'hour-row';
    row.style.height = HOUR_H + 'px';
    row.style.top = ((h-START_HOUR)*HOUR_H) + 'px';
    row.style.position = 'absolute';
    row.style.width = '100%';
    const label = document.createElement('div');
    label.className = 'hour-label';
    label.textContent = pad(h % 24) + ':00';
    const tick = document.createElement('div');
    tick.className = 'hour-tick';
    row.appendChild(label);
    row.appendChild(tick);
    rail.appendChild(row);
  }

  const layer = document.createElement('div');
  layer.className = 'blocks-layer';
  layer.style.height = totalHeight + 'px';
  rail.appendChild(layer);

  renderBlocks(layer, totalHeight);
  $('emptyHint').style.display = blocks.length ? 'none' : 'block';
}

function renderBlocks(layer, totalHeight){
  const sorted = [...blocks].sort((a,b)=> timeToMinutes(a.start) - timeToMinutes(b.start));
  // simple overlap column assignment
  const withRange = sorted.map(b=>({...b, s:timeToMinutes(b.start), e:Math.max(timeToMinutes(b.end), timeToMinutes(b.start)+20)}));
  const cols = [];
  withRange.forEach(b=>{
    let placed=false;
    for(let c=0;c<cols.length;c++){
      const last = cols[c][cols[c].length-1];
      if(b.s >= last.e){ cols[c].push(b); b.col=c; placed=true; break; }
    }
    if(!placed){ cols.push([b]); b.col = cols.length-1; }
  });
  const maxCol = Math.max(1, cols.length);

  withRange.forEach(b=>{
    const cat = catOf(b.category);
    const top = Math.max(0, minutesToTop(b.s));
    const height = Math.max(34, minutesToTop(b.e) - minutesToTop(b.s) - 4);
    const width = `calc(${100/maxCol}% - 8px)`;
    const left = `calc(${(b.col*100)/maxCol}% )`;

    const el = document.createElement('div');
    el.className = 'block';
    el.style.top = top + 'px';
    el.style.height = height + 'px';
    el.style.left = left;
    el.style.width = width;
    el.style.background = `color-mix(in srgb, ${cat.color} 22%, var(--surface))`;
    el.style.color = 'var(--text)';
    el.style.borderColor = `color-mix(in srgb, ${cat.color} 45%, transparent)`;

    el.innerHTML = `
      <span class="b-time">${cat.emoji} ${b.start}–${b.end}</span>
      <span class="b-title">${escapeHtml(b.title || cat.label)}</span>
      ${b.note ? `<span class="b-note">${escapeHtml(b.note)}</span>` : ''}
    `;
    el.addEventListener('click', ()=>openSheet(b));
    layer.appendChild(el);
  });
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderCatGrid(){
  const grid = $('catGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(c=>{
    const chip = document.createElement('div');
    chip.className = 'cat-chip' + (c.id===selectedCat ? ' selected':'');
    chip.style.setProperty('--sel-color', c.color);
    chip.innerHTML = `<div class="dot" style="background:${c.color}"></div><span>${c.emoji} ${c.label}</span>`;
    chip.addEventListener('click', ()=>{ selectedCat = c.id; renderCatGrid(); });
    grid.appendChild(chip);
  });
}

function defaultTimes(){
  const now = new Date();
  const h = pad(Math.min(23, now.getHours()));
  const m = pad(now.getMinutes() - (now.getMinutes()%15));
  const startStr = `${h}:${m}`;
  let endH = Number(h), endM = Number(m)+30;
  if(endM>=60){ endM-=60; endH+=1; }
  const endStr = `${pad(endH%24)}:${pad(endM)}`;
  return [startStr, endStr];
}

function openSheet(block){
  editingId = block ? block.id : null;
  $('sheetTitle').textContent = block ? 'Editar atividade' : 'Nova atividade';
  $('deleteBtn').style.display = block ? 'block' : 'none';
  selectedCat = block ? block.category : CATEGORIES[0].id;
  $('titleInput').value = block ? (block.title || '') : '';
  $('noteInput').value = block ? (block.note || '') : '';
  const [ds, de] = defaultTimes();
  $('startInput').value = block ? block.start : ds;
  $('endInput').value = block ? block.end : de;
  renderCatGrid();
  $('overlay').classList.add('show');
  $('sheet').classList.add('show');
}
function closeSheet(){
  $('overlay').classList.remove('show');
  $('sheet').classList.remove('show');
  editingId = null;
}

async function saveBlock(){
  const start = $('startInput').value;
  const end = $('endInput').value;
  if(!start || !end){ showToast('Preencha o horário.'); return; }
  const cat = catOf(selectedCat);
  const title = $('titleInput').value.trim();
  const note = $('noteInput').value.trim();

  if(editingId){
    const b = blocks.find(x=>x.id===editingId);
    if(b){ b.category=selectedCat; b.title=title; b.note=note; b.start=start; b.end=end; }
  } else {
    blocks.push({id:uid(), category:selectedCat, title, note, start, end});
  }
  await saveBlocks(currentDate);
  closeSheet();
  renderRail();
}

async function deleteBlock(){
  blocks = blocks.filter(b=>b.id!==editingId);
  await saveBlocks(currentDate);
  closeSheet();
  renderRail();
}

async function goToDate(d){
  currentDate = d;
  renderHeader();
  await loadBlocks(currentDate);
  renderRail();
}

async function copyFromYesterday(){
  const y = new Date(currentDate);
  y.setDate(y.getDate()-1);
  try{
    const res = await window.storage.get('blocks:' + dateKey(y), false);
    const prev = res ? JSON.parse(res.value) : [];
    if(!prev.length){ showToast('Ontem não há nada para copiar.'); return; }
    if(blocks.length && !confirm('Isso vai adicionar as atividades de ontem ao dia atual. Continuar?')) return;
    blocks = blocks.concat(prev.map(b=>({...b, id:uid()})));
    await saveBlocks(currentDate);
    renderRail();
    showToast('Copiado de ontem ✓');
  }catch(e){
    showToast('Não foi possível copiar.');
  }
}

// Events
$('prevDay').addEventListener('click', ()=>{
  const d = new Date(currentDate); d.setDate(d.getDate()-1); goToDate(d);
});
$('nextDay').addEventListener('click', ()=>{
  const d = new Date(currentDate); d.setDate(d.getDate()+1); goToDate(d);
});
$('todayBtn').addEventListener('click', ()=> goToDate(new Date()));
$('dateLabel').addEventListener('click', ()=> $('dateInput').showPicker ? $('dateInput').showPicker() : $('dateInput').click());
$('dateInput').addEventListener('change', (e)=>{
  if(e.target.value){
    const [y,m,d] = e.target.value.split('-').map(Number);
    goToDate(new Date(y, m-1, d));
  }
});
$('addBtn').addEventListener('click', ()=> openSheet(null));
$('cancelBtn').addEventListener('click', closeSheet);
$('overlay').addEventListener('click', closeSheet);
$('saveBtn').addEventListener('click', saveBlock);
$('deleteBtn').addEventListener('click', deleteBlock);
$('copyBtn').addEventListener('click', copyFromYesterday);

// Init
(async function init(){
  renderHeader();
  renderCatGrid();
  await loadBlocks(currentDate);
  renderRail();
})();
</script>
</body>
</html>
